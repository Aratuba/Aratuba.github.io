<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; url='https://drive.google.com/drive/folders/1YQ3QMUt2sdO3DgDqGejL_lUZixC3kSaH?usp=drive_link'">
    <title>Documentos 2026</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #46178f;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>Documentos 2026</h2>
    <p>Se o redirecionamento não funcionar automaticamente, <a href="https://drive.google.com/drive/folders/1YQ3QMUt2sdO3DgDqGejL_lUZixC3kSaH?usp=drive_link">clique aqui</a>.</p>

    <script>
        // Redirecionamento via JavaScript como fallback
        setTimeout(function() {
            window.location.href = "https://drive.google.com/drive/folders/1YQ3QMUt2sdO3DgDqGejL_lUZixC3kSaH?usp=drive_link";
        }, 5000);
    </script>
</body>
</html>
