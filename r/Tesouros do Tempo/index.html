<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download - Tesouros do Tempo</title>
    <!-- Meta refresh fallback (caso JavaScript esteja desabilitado) -->
    <meta http-equiv="refresh" content="6;url=https://drive.google.com/file/d/1QErJqh98mh936pfyTuyONKjgP1o-j0OE/view?usp=drive_link">
    <!-- Fonte Poppins (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para ícones (versão 6 gratuita via CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: #333;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .icon-wrapper {
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .icon-wrapper i {
            font-size: 48px;
            color: white;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .filename {
            font-size: 1.2rem;
            background: rgba(102, 126, 234, 0.1);
            padding: 8px 15px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: 500;
            color: #555;
            border: 1px dashed #667eea;
        }

        .filename i {
            margin-right: 8px;
            color: #667eea;
        }

        .countdown-box {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            margin: 25px 0;
            border-left: 5px solid #667eea;
        }

        .countdown-text {
            font-size: 1rem;
            color: #666;
            margin-bottom: 8px;
        }

        #countdown {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            line-height: 1;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 10px;
            width: 100%;
        }

        .btn-download:hover {
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.5);
            transform: scale(1.02);
        }

        .btn-download i {
            font-size: 1.3rem;
        }

        .fallback-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .fallback-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #667eea;
        }

        .fallback-link a:hover {
            border-bottom: 1px solid;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn-download {
                padding: 14px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrapper">
            <i class="fas fa-download"></i>
        </div>
        <h1>Download</h1>
        <div class="filename">
            <i class="fas fa-film"></i> Tesouros do Tempo.mov
        </div>
        <p style="margin-bottom: 15px; color: #555;">Seu arquivo está pronto para download.</p>

        <!-- Caixa de contagem regressiva -->
        <div class="countdown-box">
            <div class="countdown-text">
                <i class="fas fa-clock" style="margin-right: 5px;"></i> Iniciando automaticamente em
            </div>
            <div id="countdown">5</div>
        </div>

        <!-- Botão de download imediato -->
        <!-- IMPORTANTE: Substitua 'ID_DO_SEU_ARQUIVO' pelo ID real do arquivo no Google Drive -->
        <a href="https://drive.google.com/file/d/1QErJqh98mh936pfyTuyONKjgP1o-j0OE/view?usp=drive_link" id="downloadLink" class="btn-download">
            <i class="fas fa-cloud-download-alt"></i> Baixar agora
        </a>

        <!-- Link alternativo caso o botão não funcione -->
        <div class="fallback-link">
            <i class="fas fa-info-circle"></i> Se o download não iniciar, <a href="https://drive.google.com/file/d/1QErJqh98mh936pfyTuyONKjgP1o-j0OE/view?usp=drive_link">clique aqui</a>.
        </div>
    </div>

    <footer>
        <i class="fas fa-star"></i> Obrigado por baixar "Tesouros do Tempo" <i class="fas fa-star"></i>
    </footer>

    <script>
        (function() {
            // Substitua 'ID_DO_SEU_ARQUIVO' pelo ID real do arquivo no Google Drive
            const fileId = ''; 
            // URL direta de download do Google Drive
            const filePath = `https://drive.google.com/file/d/1QErJqh98mh936pfyTuyONKjgP1o-j0OE/view?usp=drive_link`;
            
            const downloadLink = document.getElementById('downloadLink');
            const countdownElement = document.getElementById('countdown');
            
            let secondsLeft = 5; // tempo em segundos
            let countdownInterval;
            let redirectTimeout;

            // Função para iniciar o download (redirecionar para o arquivo)
            function startDownload() {
                // Redireciona para a URL direta do Drive
                window.location.href = filePath;
            }

            // Atualiza o contador na tela
            function updateCountdown() {
                countdownElement.textContent = secondsLeft;
                if (secondsLeft <= 0) {
                    clearInterval(countdownInterval);
                    clearTimeout(redirectTimeout);
                    startDownload();
                }
                secondsLeft--;
            }

            // Inicia a contagem regressiva assim que a página carregar
            window.addEventListener('load', function() {
                // Pequeno atraso para dar tempo de tudo carregar
                redirectTimeout = setTimeout(function() {
                    countdownInterval = setInterval(updateCountdown, 1000);
                }, 500);
            });

            // Se o usuário clicar no botão, cancela a contagem e vai direto
            downloadLink.addEventListener('click', function(event) {
                // Cancela a contagem e o redirecionamento automático
                clearInterval(countdownInterval);
                clearTimeout(redirectTimeout);
                // Não precisa prevenir o comportamento padrão, o link já funciona
            });

            // Atualiza o href do link caso o fileId seja dinâmico (já está no HTML, mas por segurança)
            downloadLink.href = filePath;
            // Também atualiza o link de fallback (opcional)
            const fallbackLink = document.querySelector('.fallback-link a');
            if (fallbackLink) fallbackLink.href = filePath;
        })();
    </script>
</body>
</html>
