<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programas Inteligentes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 18px;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            margin: 20px auto;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .timer {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }
        
        .button {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            margin-top: 20px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        
        .button:hover {
            background: #5a67d8;
        }
        
        .manual-link {
            color: #999;
            font-size: 14px;
            margin-top: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Programas Inteligentes</h1>
        <p>Preparando seu download...</p>
        
        <div class="loader"></div>
        
        <div class="timer" id="timer">5</div>
        <p>Você será redirecionado automaticamente em instantes</p>
        
        <a href="https://drive.google.com/drive/folders/1_gYLBB8h-FKXmXgbbPcPiwfsh7g4ZqD-" 
           class="button" 
           target="_blank" 
           rel="noopener noreferrer">
            Clique aqui se não redirecionar
        </a>
        
        <div class="manual-link">
            Link direto:<br>
            <small>drive.google.com/drive/folders/1_gYLBB8h-FKXmXgbbPcPiwfsh7g4ZqD-</small>
        </div>
    </div>

    <script>
        // Contador regressivo de 5 segundos
        let seconds = 5;
        const timerElement = document.getElementById('timer');
        const redirectUrl = 'https://drive.google.com/drive/folders/1_gYLBB8h-FKXmXgbbPcPiwfsh7g4ZqD-';
        
        function updateTimer() {
            timerElement.textContent = seconds;
            
            if (seconds <= 0) {
                window.location.href = redirectUrl;
            } else {
                seconds--;
                setTimeout(updateTimer, 1000);
            }
        }
        
        // Inicia o timer quando a página carrega
        window.onload = function() {
            updateTimer();
        };
        
        // Fallback: redireciona após 5 segundos (garantia)
        setTimeout(function() {
            window.location.href = redirectUrl;
        }, 5500); // 5.5 segundos como backup
    </script>
</body>
</html>
