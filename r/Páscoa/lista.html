<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Links Páscoa - A4</title>

<style>
  @page {
    size: A4;
    margin: 10mm;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .page {
    width: 210mm;
    height: 297mm;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10mm;
    padding: 10mm;
    box-sizing: border-box;
  }

  .item {
    border: 1px solid #ccc;
    padding: 10mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .num {
    font-weight: bold;
    margin-bottom: 5mm;
  }

  a {
    word-break: break-all;
    color: blue;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  @media print {
    a {
      color: black;
      text-decoration: none;
    }
  }
</style>
</head>
<body>

<div class="page" id="lista"></div>

<script>
const base = "https://aratuba.abc.br/r/Páscoa/?n=";

const container = document.getElementById("lista");

for (let i = 1; i <= 30; i++) {
  let url = base + i;

  let div = document.createElement("div");
  div.className = "item";

  let num = document.createElement("div");
  num.className = "num";
  num.innerText = "Nº " + i;

  let link = document.createElement("a");
  link.href = url;
  link.innerText = url;
  link.target = "_blank";

  div.appendChild(num);
  div.appendChild(link);
  container.appendChild(div);
}
</script>

</body>
</html>
