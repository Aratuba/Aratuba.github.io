<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
    background:#e9f5e9;
    margin:0;
    padding:12px;
    color:#1a3b2f;
}

.container{
    max-width:700px;
    margin:0 auto;
    background:white;
    border-radius:28px;
    box-shadow:0 8px 20px rgba(0,32,0,.1);
    padding:18px 16px;
}

h2{
    margin:0 0 1rem 0;
    font-weight:600;
    font-size:1.6rem;
    color:#1f543b;
    border-left:5px solid #2b7a4b;
    padding-left:14px;
}

input,select,textarea,button{
    font-family:inherit;
    font-size:16px;
    border-radius:28px;
    border:1px solid #cbdcd0;
    padding:12px 16px;
    background-color:#fefef7;
    width:100%;
    margin-bottom:14px;
    transition:.2s;
}

textarea{
    border-radius:24px;
    resize:vertical;
    min-height:80px;
}

input:focus,select:focus,textarea:focus{
    outline:none;
    border-color:#2b7a4b;
    box-shadow:0 0 0 3px rgba(43,122,75,.2);
}

label{
    font-weight:600;
    margin:8px 0 4px 0;
    display:block;
    color:#1e4a36;
    font-size:.9rem;
}

.table-wrapper{
    overflow-x:auto;
    margin:20px 0;
    border-radius:20px;
    border:1px solid #e2ede6;
    background:white;
    -webkit-overflow-scrolling:touch;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:500px;
}

th{
    background-color:#e0f0e6;
    padding:12px 6px;
    font-weight:600;
    text-align:center;
    color:#1c4d38;
    font-size:.75rem;
    border-bottom:1px solid #c2dbc8;
}

td{
    padding:10px 4px;
    text-align:center;
    border-bottom:1px solid #e2ede6;
    vertical-align:middle;
}

.parametro{
    font-weight:600;
    background-color:#fafdf8;
    text-align:left;
    padding-left:10px;
    font-size:.8rem;
    white-space:nowrap;
}

td input[type="radio"]{
    transform:scale(1.2);
    width:20px;
    height:20px;
    margin:6px auto;
    display:inline-block;
    accent-color:#2b7a4b;
}

td small{
    font-size:.65rem;
    display:block;
    color:#4d6a5c;
    font-weight:normal;
    line-height:1.2;
}

.btn-calc,.btn-kml{
    background:#2b7a4b;
    color:white;
    font-weight:bold;
    border:none;
    padding:14px 20px;
    cursor:pointer;
    margin:8px 6px 8px 0;
    width:auto;
    display:inline-block;
    border-radius:40px;
    font-size:1rem;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.btn-kml{
    background:#2c6e9e;
}

.coord-panel{
    background:#eef5f0;
    padding:16px;
    border-radius:28px;
    margin:16px 0;
    border:1px solid #cde0d4;
}

.coord-row{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:12px;
}

.coord-field{
    flex:1;
    min-width:120px;
}

.coord-field input{
    margin-bottom:0;
}

.coord-buttons{
    display:flex;
    gap:10px;
    margin-top:8px;
}

.small-btn{
    background:#d9e6df;
    color:#1f543b;
    border:none;
    padding:10px 16px;
    font-weight:500;
    cursor:pointer;
    border-radius:40px;
    font-size:.85rem;
    flex:1;
}

#geo{
    background:#eef2ef;
    border-radius:40px;
    padding:10px 14px;
    font-family:monospace;
    font-size:.8rem;
    margin:12px 0 0;
    word-break:break-word;
}

#resultado{
    font-size:1rem;
    background:#fef7e0;
    padding:12px;
    border-radius:32px;
    margin:16px 0;
    text-align:center;
}

@media(max-width:480px){
    .container{
        padding:14px;
    }

    th,td{
        font-size:.7rem;
    }

    .parametro{
        font-size:.75rem;
    }

    td input[type="radio"]{
        transform:scale(1.1);
    }

    .btn-calc,.btn-kml{
        padding:12px 16px;
        font-size:.9rem;
    }
}
</style>
</head>

<div class="container">

<h2>Avaliação de Nascente</h2>

<input id="localidade" placeholder="📍 Localidade / município" autocomplete="off">

<input id="coletor" placeholder="👤 Nome do coletor / avaliador" autocomplete="off">

<textarea id="obs" placeholder="📝 Observações de campo (vegetação, acesso, entorno...)"></textarea>

<label>🏷️ Nome da nascente (opcional)</label>

<input id="nomeNascente" placeholder="Ex: Olho d'água do Sítio">

<div class="table-wrapper">
<table id="tabelaParametros">

<thead>
<tr>
<th>Parâmetro</th>
<th>Ruim (1)</th>
<th>Médio (2)</th>
<th>Bom (3)</th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>
</div>

<div class="coord-panel">

<div style="font-weight:600;margin-bottom:12px;">
🌍 Localização geográfica
</div>

<div class="coord-row">

<div class="coord-field">
<label>📐 Latitude</label>
<input type="number" id="latitudeInput" step="any" placeholder="Ex: -4.1234">
</div>

<div class="coord-field">
<label>📏 Longitude</label>
<input type="number" id="longitudeInput" step="any" placeholder="Ex: -39.5678">
</div>

</div>

<div class="coord-buttons">
<button class="small-btn" id="definirCoordsBtn">✅ Definir</button>
<button class="small-btn" id="limparCoordsBtn">🗑️ Limpar</button>
</div>

<p id="geo">📍 Nenhuma coordenada definida</p>

<small style="color:#4e6b5e;">
🔹 Formato decimal: negativo para S/W.
Ex: -4.1234 , -39.5678
</small>

</div>

<div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:10px 0 6px;">
<button class="btn-calc" onclick="calcularPontuacao()">📊 Calcular pontuação</button>
<button class="btn-kml" onclick="gerarKML()">🗺️ Exportar KML</button>
</div>

<p id="resultado"></p>

</div>

<script>

const parametros = [
{nome:"Cor da água",opcoes:["escura","clara","transparente"]},
{nome:"Odor da água",opcoes:["forte","com odor","ausente"]},
{nome:"Resíduo ao redor da nascente",opcoes:["muito","pouco","ausente"]},
{nome:"Materiais flutuantes",opcoes:["muito","pouco","ausente"]},
{nome:"Espumas",opcoes:["muito","pouco","ausente"]},
{nome:"Óleos",opcoes:["muito","pouco","ausente"]},
{nome:"Esgoto na nascente",opcoes:["visível","provável","ausente"]},
{nome:"Vegetação",opcoes:["alta degradação","baixa degradação","preservada"]},
{nome:"Uso por animais",opcoes:["presença","apenas marcas","não detectado"]},
{nome:"Uso por humanos",opcoes:["presença","apenas marcas","não detectado"]},
{nome:"Proteção do local",opcoes:["sem proteção","com acesso","sem acesso"]},
{nome:"Proximidade com residências",opcoes:["<50m","50-100m",">100m"]},
{nome:"Área de inserção",opcoes:["sem info","privada","protegida"]}
];

const tbody=document.getElementById("body");

parametros.forEach(p=>{

    let row=document.createElement("tr");

    let tdParam=document.createElement("td");
    tdParam.className="parametro";
    tdParam.innerText=p.nome;

    row.appendChild(tdParam);

    p.opcoes.forEach((opcao,idx)=>{

        let td=document.createElement("td");

        let radio=document.createElement("input");
        radio.type="radio";
        radio.name=p.nome;
        radio.value=idx+1;

        let label=document.createElement("small");
        label.innerText=opcao;

        td.appendChild(radio);
        td.appendChild(document.createElement("br"));
        td.appendChild(label);

        row.appendChild(td);

    });

    tbody.appendChild(row);

});

let latAtual=null;
let lonAtual=null;
let pontuacaoTotal=0;

const latInput=document.getElementById("latitudeInput");
const lonInput=document.getElementById("longitudeInput");
const geo=document.getElementById("geo");

function definirCoordenadas(){

    let lat=parseFloat(latInput.value);
    let lon=parseFloat(lonInput.value);

    if(isNaN(lat)||lat<-90||lat>90){
        alert("Latitude inválida");
        return;
    }

    if(isNaN(lon)||lon<-180||lon>180){
        alert("Longitude inválida");
        return;
    }

    latAtual=lat;
    lonAtual=lon;

    geo.innerHTML=`📍 Latitude: ${latAtual} | Longitude: ${lonAtual}`;

}

function limparCoordenadas(){

    latInput.value="";
    lonInput.value="";

    latAtual=null;
    lonAtual=null;

    geo.innerHTML="📍 Nenhuma coordenada definida";

}

function calcularPontuacao(){

    let soma=0;

    document.querySelectorAll("input[type='radio']:checked")
    .forEach(r=>soma+=parseInt(r.value));

    pontuacaoTotal=soma;

    const maximo=parametros.length*3;

    document.getElementById("resultado").innerHTML=
    `🏆 Pontuação: <strong>${pontuacaoTotal}</strong> / ${maximo}`;

    return pontuacaoTotal;

}

async function sha256(message){

    const msgBuffer=new TextEncoder().encode(message);

    const hashBuffer=
    await crypto.subtle.digest("SHA-256",msgBuffer);

    const hashArray=
    Array.from(new Uint8Array(hashBuffer));

    return hashArray
    .map(b=>b.toString(16).padStart(2,"0"))
    .join("");

}

function getClassByScore(score){

    if(score>=40)return "A";
    if(score>=30)return "B";
    if(score>=20)return "C";
    if(score>=10)return "D";

    return "E";

}

function escapeXml(str){

    if(!str)return "";

    return str
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

}

async function gerarKML(){

    if(latAtual===null||lonAtual===null){
        alert("Defina as coordenadas.");
        return;
    }

    calcularPontuacao();

    let dadosParametros={};

    document
    .querySelectorAll("input[type='radio']:checked")
    .forEach(radio=>{

        const paramNome=radio.name;
        const valorNum=radio.value;

        const paramObj=
        parametros.find(p=>p.nome===paramNome);

        let textoOpcao=
        paramObj
        ? paramObj.opcoes[parseInt(valorNum)-1]
        : "indefinido";

        dadosParametros[paramNome]={
            valor:valorNum,
            texto:textoOpcao
        };

    });

    const localidade=
    document.getElementById("localidade")?.value.trim()
    ||"Local não informado";

    const coletor=
    document.getElementById("coletor")?.value.trim()
    ||"Não informado";

    const observacoes=
    document.getElementById("obs")?.value.trim()
    ||"Sem observações";

    const nomeNascente=
    document.getElementById("nomeNascente")?.value.trim()
    ||"Não informado";

    const coordsString=`${lonAtual},${latAtual}`;

    const hashHex=await sha256(coordsString);

    const dataAtual=new Date();

    const dataStr=
    dataAtual.toISOString().slice(0,10);

    const placemarkName=
    `${hashHex} (${dataStr})`;

    const classe=
    getClassByScore(pontuacaoTotal);

    const imagemClasse=
    `https://aratuba.abc.br/${classe}.PNG`;

    let listaParametrosHTML="";

    for(let p of parametros){

        const dado=dadosParametros[p.nome];

        if(dado){

            listaParametrosHTML+=
            `▪ ${p.nome}: ${dado.texto} (${dado.valor})<br>`;

        }else{

            listaParametrosHTML+=
            `▪ ${p.nome}: não avaliado<br>`;

        }

    }

    const descricaoHTML=`
    <div style="font-family:sans-serif;padding:5px;">

    <img src="${imagemClasse}" width="100"><br>

    <b>🏞️ Nascente:</b> ${escapeXml(nomeNascente)}<br>

    <b>📍 Localidade:</b> ${escapeXml(localidade)}<br>

    <b>⭐ Pontuação:</b>
    ${pontuacaoTotal}/${parametros.length*3}<br>

    <b>👤 Coletor:</b> ${escapeXml(coletor)}<br>

    <b>📝 Observações:</b>
    ${escapeXml(observacoes)}<br>

    <hr>

    <b>📋 Parâmetros:</b><br>

    ${listaParametrosHTML}

    </div>
    `;

    let extendedData=`

    <Data name="localidade">
    <value>${escapeXml(localidade)}</value>
    </Data>

    <Data name="coletor">
    <value>${escapeXml(coletor)}</value>
    </Data>

    <Data name="observacoes">
    <value>${escapeXml(observacoes)}</value>
    </Data>

    <Data name="pontuacao">
    <value>${pontuacaoTotal}</value>
    </Data>

    <Data name="nome_nascente">
    <value>${escapeXml(nomeNascente)}</value>
    </Data>

    `;

    const kmlContent=`<?xml version="1.0" encoding="UTF-8"?>

<kml xmlns="http://www.opengis.net/kml/2.2">

<Document>

<Style id="A">
<IconStyle>
<scale>1.2</scale>
<Icon>
<href>http://maps.google.com/mapfiles/kml/pushpin/grn-pushpin.png</href>
</Icon>
</IconStyle>
</Style>

<Style id="B">
<IconStyle>
<scale>1.2</scale>
<Icon>
<href>http://maps.google.com/mapfiles/kml/pushpin/ylw-pushpin.png</href>
</Icon>
</IconStyle>
</Style>

<Style id="C">
<IconStyle>
<scale>1.2</scale>
<Icon>
<href>http://maps.google.com/mapfiles/kml/pushpin/blue-pushpin.png</href>
</Icon>
</IconStyle>
</Style>

<Style id="D">
<IconStyle>
<scale>1.2</scale>
<Icon>
<href>http://maps.google.com/mapfiles/kml/pushpin/purple-pushpin.png</href>
</Icon>
</IconStyle>
</Style>

<Style id="E">
<IconStyle>
<scale>1.2</scale>
<Icon>
<href>http://maps.google.com/mapfiles/kml/pushpin/red-pushpin.png</href>
</Icon>
</IconStyle>
</Style>

<Placemark>

<name>${escapeXml(placemarkName)}</name>

<styleUrl>#${classe}</styleUrl>

<description><![CDATA[
${descricaoHTML}
]]></description>

<Point>
<coordinates>${lonAtual},${latAtual},0</coordinates>
</Point>

<ExtendedData>
${extendedData}
</ExtendedData>

</Placemark>

</Document>
</kml>`;

    const blob=new Blob(
        [kmlContent],
        {type:"application/vnd.google-earth.kml+xml"}
    );

    const link=document.createElement("a");

    link.download=
    `nascente_${hashHex.substring(0,12)}_${dataStr}.kml`;

    link.href=URL.createObjectURL(blob);

    link.click();

    URL.revokeObjectURL(link.href);

    alert(
        `✅ KML gerado!\nClasse: ${classe}\nPontuação: ${pontuacaoTotal}`
    );

}

document
.getElementById("definirCoordsBtn")
.addEventListener("click",definirCoordenadas);

document
.getElementById("limparCoordsBtn")
.addEventListener("click",limparCoordenadas);

</script>
