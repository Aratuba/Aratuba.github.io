<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🖱️ Treino de Cliques (CPS)</title>
    <style>
        /* ─── Reset & Base ─── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            padding: 20px;
            user-select: none;
        }

        .card {
            max-width: 660px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 36px 32px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
        }

        /* ─── Header ─── */
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header h1 span {
            background: rgba(99, 102, 241, 0.25);
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            color: #a5b4fc;
        }

        .sub {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
        }

        /* ─── Stats ─── */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.4);
            padding: 12px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        .stat-item .value {
            color: #f1f5f9;
            font-size: 24px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 40px;
        }

        .stat-item .value.time {
            min-width: 30px;
            color: #fcd34d;
        }
        .stat-item .value.clicks {
            color: #60a5fa;
        }
        .stat-item .value.cps {
            color: #4ade80;
        }

        /* ─── Click Zone ─── */
        .click-zone {
            background: rgba(99, 102, 241, 0.08);
            border: 2px dashed rgba(99, 102, 241, 0.25);
            border-radius: 40px;
            padding: 50px 20px;
            margin-bottom: 28px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            min-height: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .click-zone:hover:not(.disabled) {
            background: rgba(99, 102, 241, 0.14);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .click-zone:active:not(.disabled) {
            transform: scale(0.97);
        }

        .click-zone.disabled {
            cursor: not-allowed;
            opacity: 0.6;
            border-color: rgba(255, 255, 255, 0.08);
        }

        .click-zone .big-icon {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 12px;
            transition: transform 0.1s;
        }

        .click-zone:active:not(.disabled) .big-icon {
            transform: scale(0.85);
        }

        .click-zone .label {
            font-size: 22px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .click-zone .sub-label {
            font-size: 15px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .click-zone .result-cps {
            font-size: 48px;
            font-weight: 800;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.10);
            padding: 8px 28px;
            border-radius: 60px;
            border: 1px solid rgba(74, 222, 128, 0.15);
        }

        /* ─── Ripple effect ─── */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.3);
            transform: scale(0);
            animation: rippleAnim 0.5s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* ─── Controls ─── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .time-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(15, 23, 42, 0.4);
            padding: 4px 8px 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .time-selector label {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
        }

        .time-selector select {
            background: transparent;
            color: #f1f5f9;
            border: none;
            padding: 8px 8px 8px 4px;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .time-selector select option {
            background: #1e293b;
            color: #f1f5f9;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .actions button {
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }

        .actions button:hover {
            background: rgba(99, 102, 241, 0.25);
            transform: translateY(-2px);
        }

        .actions button:active {
            transform: translateY(0px);
        }

        .actions button.primary {
            background: #6366f1;
            color: #fff;
            border-color: #6366f1;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.25);
        }

        .actions button.primary:hover {
            background: #4f46e5;
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.35);
            transform: translateY(-2px);
        }

        .actions button.primary:active {
            transform: translateY(0px);
        }

        .actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── Responsive ─── */
        @media (max-width: 500px) {
            .card {
                padding: 24px 16px 30px;
            }
            .header h1 {
                font-size: 20px;
                flex-wrap: wrap;
            }
            .stats {
                gap: 16px;
                padding: 10px 14px;
            }
            .stat-item .value {
                font-size: 20px;
                min-width: 28px;
            }
            .click-zone {
                min-height: 180px;
                padding: 30px 16px;
            }
            .click-zone .big-icon {
                font-size: 52px;
            }
            .click-zone .label {
                font-size: 18px;
            }
            .click-zone .result-cps {
                font-size: 36px;
                padding: 4px 20px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .time-selector {
                justify-content: center;
                padding: 6px 12px;
            }
            .actions {
                justify-content: center;
            }
            .actions button {
                padding: 10px 24px;
                font-size: 14px;
                flex: 1;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Header -->
        <div class="header">
            <h1>
                🖱️ Cliques
                <span>CPS</span>
            </h1>
            <p class="sub">Clique o mais rápido que puder dentro do tempo limite</p>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-item">
                ⏱️
                <span class="value time" id="timerDisplay">0</span>
                <span style="font-size:13px;color:#64748b;">s</span>
            </div>
            <div class="stat-item">
                👆
                <span class="value clicks" id="clickCount">0</span>
                <span style="font-size:13px;color:#64748b;">cliques</span>
            </div>
            <div class="stat-item">
                ⚡
                <span class="value cps" id="cpsDisplay">0.00</span>
                <span style="font-size:13px;color:#64748b;">CPS</span>
            </div>
        </div>

        <!-- Click Zone -->
        <div class="click-zone disabled" id="clickZone">
            <div class="big-icon" id="zoneIcon">🖱️</div>
            <div class="label" id="zoneLabel">Clique aqui</div>
            <div class="sub-label" id="zoneSub">ou pressione Espaço</div>
            <div class="result-cps" id="finalCps" style="display:none;"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="time-selector">
                <label for="timeSelect">⏳</label>
                <select id="timeSelect">
                    <option value="3">3 segundos</option>
                    <option value="5" selected>5 segundos</option>
                    <option value="10">10 segundos</option>
                    <option value="15">15 segundos</option>
                    <option value="30">30 segundos</option>
                </select>
            </div>

            <div class="actions">
                <button id="startBtn" class="primary">▶️ Iniciar</button>
                <button id="resetBtn">🔄 Reiniciar</button>
            </div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ────────────────────────────────────────────
            const clickZone = document.getElementById('clickZone');
            const timerDisplay = document.getElementById('timerDisplay');
            const clickCountEl = document.getElementById('clickCount');
            const cpsDisplay = document.getElementById('cpsDisplay');
            const finalCps = document.getElementById('finalCps');
            const zoneIcon = document.getElementById('zoneIcon');
            const zoneLabel = document.getElementById('zoneLabel');
            const zoneSub = document.getElementById('zoneSub');
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            const timeSelect = document.getElementById('timeSelect');

            // ─── State ────────────────────────────────────────────────
            let state = {
                status: 'idle', // 'idle' | 'running' | 'finished'
                timeLimit: 5,
                timeLeft: 5,
                clicks: 0,
                timerId: null,
            };

            // ─── Helpers ──────────────────────────────────────────────

            function updateUI() {
                timerDisplay.textContent = state.timeLeft;
                clickCountEl.textContent = state.clicks;

                if (state.status === 'running') {
                    const elapsed = state.timeLimit - state.timeLeft;
                    const currentCps = elapsed > 0 ? (state.clicks / elapsed) : 0;
                    cpsDisplay.textContent = currentCps.toFixed(2);
                } else if (state.status === 'finished') {
                    const cps = state.timeLimit > 0 ? (state.clicks / state.timeLimit) : 0;
                    cpsDisplay.textContent = cps.toFixed(2);
                } else {
                    cpsDisplay.textContent = '0.00';
                }
            }

            function setClickZoneEnabled(enabled) {
                if (enabled) {
                    clickZone.classList.remove('disabled');
                } else {
                    clickZone.classList.add('disabled');
                }
            }

            function setControlsEnabled(enabled) {
                startBtn.disabled = !enabled;
                timeSelect.disabled = !enabled;
            }

            function resetUItoIdle() {
                state.status = 'idle';
                state.clicks = 0;
                state.timeLeft = state.timeLimit;
                setClickZoneEnabled(false);
                setControlsEnabled(true);
                finalCps.style.display = 'none';
                zoneIcon.textContent = '🖱️';
                zoneLabel.textContent = 'Clique aqui';
                zoneSub.textContent = 'ou pressione Espaço';
                updateUI();
                if (state.timerId) {
                    clearInterval(state.timerId);
                    state.timerId = null;
                }
            }

            function showFinalResult() {
                const cps = state.timeLimit > 0 ? (state.clicks / state.timeLimit) : 0;
                finalCps.textContent = `${cps.toFixed(2)} CPS`;
                finalCps.style.display = 'block';
                zoneIcon.textContent = '🏁';
                zoneLabel.textContent = 'Concluído!';
                zoneSub.textContent = ` ${state.clicks} cliques em ${state.timeLimit}s`;
                setClickZoneEnabled(false);
                setControlsEnabled(true);
                updateUI();
            }

            // ─── Timer ────────────────────────────────────────────────

            function startTimer() {
                if (state.timerId) {
                    clearInterval(state.timerId);
                    state.timerId = null;
                }

                state.status = 'running';
                state.timeLeft = state.timeLimit;
                state.clicks = 0;
                setClickZoneEnabled(true);
                setControlsEnabled(false);
                finalCps.style.display = 'none';
                zoneIcon.textContent = '🔥';
                zoneLabel.textContent = 'Clique! Clique!';
                zoneSub.textContent = 'Até o tempo acabar';
                updateUI();

                state.timerId = setInterval(() => {
                    state.timeLeft -= 1;
                    updateUI();

                    // Update CPS during the run
                    const elapsed = state.timeLimit - state.timeLeft;
                    if (elapsed > 0) {
                        const currentCps = state.clicks / elapsed;
                        cpsDisplay.textContent = currentCps.toFixed(2);
                    }

                    if (state.timeLeft <= 0) {
                        clearInterval(state.timerId);
                        state.timerId = null;
                        state.status = 'finished';
                        showFinalResult();
                    }
                }, 1000);
            }

            // ─── Click handler ────────────────────────────────────────

            function handleClick(e) {
                if (state.status !== 'running') return;

                state.clicks += 1;
                clickCountEl.textContent = state.clicks;

                // Update CPS on click
                const elapsed = state.timeLimit - state.timeLeft;
                if (elapsed > 0) {
                    const currentCps = state.clicks / elapsed;
                    cpsDisplay.textContent = currentCps.toFixed(2);
                }

                // Ripple effect
                const rect = clickZone.getBoundingClientRect();
                const x = (e.clientX || e.pageX) - rect.left;
                const y = (e.clientY || e.pageY) - rect.top;
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                const size = Math.min(rect.width, rect.height) * 0.6;
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (x - size / 2) + 'px';
                ripple.style.top = (y - size / 2) + 'px';
                clickZone.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);

                // Small haptic-like feedback on icon
                zoneIcon.style.transform = 'scale(0.8)';
                setTimeout(() => zoneIcon.style.transform = 'scale(1)', 100);
            }

            // ─── Controls ─────────────────────────────────────────────

            function startGame() {
                if (state.status === 'running') return;
                state.timeLimit = parseInt(timeSelect.value, 10);
                resetUItoIdle(); // clean state
                startTimer();
            }

            function resetGame() {
                if (state.timerId) {
                    clearInterval(state.timerId);
                    state.timerId = null;
                }
                state.timeLimit = parseInt(timeSelect.value, 10);
                resetUItoIdle();
                // garantir que o select está habilitado
                setControlsEnabled(true);
                // foco no botão start
                startBtn.focus();
            }

            // ─── Keyboard support ─────────────────────────────────────

            function handleKeydown(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (state.status === 'running') {
                        // Simulate a click on the zone
                        const fakeEvent = { clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 };
                        handleClick(fakeEvent);
                    } else if (state.status === 'idle' || state.status === 'finished') {
                        startGame();
                    }
                }
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    // just a shortcut, but we already have reset button
                }
            }

            // ─── Init ──────────────────────────────────────────────────

            function init() {
                state.timeLimit = parseInt(timeSelect.value, 10);
                resetUItoIdle();
                setControlsEnabled(true);

                // Events
                clickZone.addEventListener('click', handleClick);

                startBtn.addEventListener('click', startGame);

                resetBtn.addEventListener('click', resetGame);

                timeSelect.addEventListener('change', function() {
                    if (state.status === 'idle' || state.status === 'finished') {
                        state.timeLimit = parseInt(timeSelect.value, 10);
                        resetUItoIdle();
                    } else {
                        // if running, do not allow change, but we can update the time limit for next run
                        // just store it, but better to reset if user tries
                        // we'll just update the value
                        state.timeLimit = parseInt(timeSelect.value, 10);
                        // if idle, update display
                        if (state.status === 'idle') {
                            resetUItoIdle();
                        }
                    }
                });

                document.addEventListener('keydown', handleKeydown);

                // Prevent context menu on click zone (right-click)
                clickZone.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            init();

        })();
    </script>

</body>
</html>
