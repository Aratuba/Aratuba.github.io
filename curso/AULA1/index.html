            background:#f5f7fa;
            display:flex;
            justify-content:center;

            min-height:100vh;
        }

        .container{
            width:min(700px,90%);

            margin-bottom:25px;
            color:#1f4fa3;
        }

        .links{
            display:grid;

        }

        a{
            display:block;
            text-decoration:none;
            background:#1f4fa3;
            color:white;
            padding:16px;
            border-radius:8px;
            font-size:18px;
            transition:.2s;
        }

        a:hover{
            background:#163c7d;
            transform:translateY(-2px);
        }

        .descricao{
            font-size:14px;
            opacity:.85;
            margin-top:5px;
