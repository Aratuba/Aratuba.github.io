<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Online Interessantes</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

header{
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:40px;
    margin-bottom:10px;
}

header p{
    opacity:0.8;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:#ffffff10;
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:25px;
    width:280px;
    text-align:center;
    transition:0.3s;
    border:1px solid #ffffff20;
}

.card:hover{
    transform:translateY(-5px);
    background:#ffffff20;
}

.card h2{
    margin-bottom:10px;
}

.card p{
    font-size:14px;
    opacity:0.85;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 18px;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.btn:hover{
    background:#2563eb;
}

footer{
    text-align:center;
    padding:30px;
    opacity:0.6;
    font-size:14px;
}
</style>
</head>

<body>

<header>
<h1>🎮 Jogos Online</h1>
<p>Sites divertidos para jogar direto no navegador</p>
</header>

<div class="container">

<div class="card">
<h2>Quick Draw</h2>
<p>A inteligência artificial tenta adivinhar o que você desenha em tempo real.</p>
<a class="btn" href="https://quickdraw.withgoogle.com" target="_blank">
Acessar
</a>
</div>

<div class="card">
<h2>Helpful Games</h2>
<p>Jogos educativos e interativos para aprender enquanto se diverte.</p>
<a class="btn" href="https://share.google/raan27pqSNZQ7GLdk" target="_blank">
Acessar
</a>
</div>

</div>

<footer>
Página simples de links • 2026
</footer>

</body>
</html>
