<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="5; url='https://wordwall.net/pt-br/community/means-of-transportation'">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/Chain_link_icon_slanted.png">
    <title>Redirecionando . . .</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f0f0;
        }
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #46178f;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>https://wordwall.net/pt-br/community/means-of-transportation</h2>
    <p>Se o redirecionamento não funcionar automaticamente, <a href="https://wordwall.net/pt-br/community/means-of-transportation">clique aqui</a>.</p>

    <script>
        // Redirecionamento via JavaScript como fallback
        setTimeout(function() {
            window.location.href = "https://wordwall.net/pt-br/community/means-of-transportation";
        }, 5000);
    </script>
</body>
</html>
