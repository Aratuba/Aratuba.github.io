<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades de Matemática - Kahoot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f0fe 0%, #d4e4ff 30%, #f0e6ff 60%, #e8f0fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header .icon-math {
            font-size: 60px;
            display: block;
            margin-bottom: 5px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-18px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-8px);
            }
            85% {
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.7);
        }

        .header p {
            font-size: 1.1rem;
            color: #444;
            margin-top: 4px;
            font-weight: 500;
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
            width: 100%;
        }

        .card {
            flex: 1 1 280px;
            max-width: 340px;
            background: #ffffff;
            border-radius: 24px;
            padding: 30px 24px 28px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.10), 0 4px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            border: 2px solid transparent;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            border-radius: 24px 24px 0 0;
        }

        .card.card-6ano::before {
            background: linear-gradient(90deg, #ff9a3c, #ff6f3c);
        }

        .card.card-8ano::before {
            background: linear-gradient(90deg, #5b6af0, #3b4bdb);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15), 0 8px 16px rgba(0, 0, 0, 0.08);
        }

        .card-6ano:hover {
            border-color: #ff9a3c;
        }

        .card-8ano:hover {
            border-color: #5b6af0;
        }

        .card .badge {
            display: inline-block;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #fff;
            margin-top: 4px;
        }

        .badge-6ano {
            background: #ff6f3c;
        }

        .badge-8ano {
            background: #3b4bdb;
        }

        .card .emoji-grade {
            font-size: 55px;
            display: block;
            margin-bottom: -5px;
        }

        .card h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
        }

        .card .subject-tag {
            font-size: 0.95rem;
            color: #666;
            background: #f5f5f7;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
        }

        .btn-kahoot {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 14px 26px;
            border-radius: 50px;
            color: #fff;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
            margin-top: 6px;
        }

        .btn-6ano {
            background: #ff6f3c;
        }

        .btn-6ano:hover {
            background: #e85d2a;
            box-shadow: 0 10px 24px rgba(255, 111, 60, 0.4);
            transform: scale(1.04);
        }

        .btn-8ano {
            background: #3b4bdb;
        }

        .btn-8ano:hover {
            background: #2d3bbf;
            box-shadow: 0 10px 24px rgba(59, 75, 219, 0.4);
            transform: scale(1.04);
        }

        .btn-kahoot .arrow {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .btn-kahoot:hover .arrow {
            transform: translateX(5px);
        }

        .footer-note {
            text-align: center;
            font-size: 0.9rem;
            color: #555;
            margin-top: 5px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.6);
            padding: 10px 22px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 650px) {
            .header h1 {
                font-size: 1.9rem;
            }
            .card {
                padding: 24px 18px 22px;
                gap: 12px;
            }
            .btn-kahoot {
                padding: 12px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <div class="header">
            <span class="icon-math">📐✨</span>
            <h1>Atividades de Matemática</h1>
            <p>Escolha o seu ano e clique no link para jogar no Kahoot!</p>
        </div>

        <!-- Cards com os links -->
        <div class="cards">
            <!-- Card 6º Ano -->
            <div class="card card-6ano">
                <span class="emoji-grade">🧮</span>
                <span class="badge badge-6ano">6º Ano</span>
                <h3>Matemática</h3>
                <span class="subject-tag">📏 Números, operações & raciocínio</span>
                <a href="https://kahoot.it/challenge/07502441?challenge-id=9ea7e23c-14c9-40d6-90c7-0221f3096d6d_1781631257610"
                target="_blank"
                rel="noopener noreferrer"
                class="btn-kahoot btn-6ano">
                🎮 Jogar Agora <span class="arrow">→</span>
            </a>
        </div>

        <!-- Card 8º Ano -->
        <div class="card card-8ano">
            <span class="emoji-grade">📊</span>
            <span class="badge badge-8ano">8º Ano</span>
            <h3>Matemática</h3>
            <span class="subject-tag">📐 Álgebra, geometria & desafios</span>
            <a href="https://kahoot.it/challenge/04418630?challenge-id=9ea7e23c-14c9-40d6-90c7-0221f3096d6d_1781822648061"
            target="_blank"
            rel="noopener noreferrer"
            class="btn-kahoot btn-8ano">
            🎮 Jogar Agora <span class="arrow">→</span>
        </a>
    </div>
</div>

<!-- Rodapé informativo -->
<div class="footer-note">
    🔗 Clique no botão para abrir o desafio Kahoot em uma nova aba.
</div>
</div>
</body>
</html>
